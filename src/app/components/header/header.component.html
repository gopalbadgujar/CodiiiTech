<header class="site-header" [class.scrolled]="isScrolled">
    <div class="container">
        <div class="brand">
            <a routerLink="/" class="logo">
                <img src="assets/companyLogo_2.png" alt="Company Logo" class="logo-img">
            </a>
        </div>


        <!-- NEW CENTER SCROLLING TEXT -->
        <div class="company-ticker">
            <div class="ticker-track">

                <span>🚀 Building Modern SaaS Solutions</span>
                <span>⚡ High Performance Web Development</span>
                <span>💻 Angular • Cloud • Enterprise Software</span>
                <span>🌍 Digital Transformation Partner</span>
                <span>🔐 Secure & Scalable Applications</span>

            </div>
        </div>

        <nav class="nav">

            <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
                Home
            </a>

            <a routerLink="/about" routerLinkActive="active">
                About Us
            </a>

            <a routerLink="/services" routerLinkActive="active">
                Services
            </a>

            <a routerLink="/career" routerLinkActive="active">
                Career
            </a>

            <a routerLink="/contact" routerLinkActive="active">
                Contact
            </a>

        </nav>
    </div>
</header>
