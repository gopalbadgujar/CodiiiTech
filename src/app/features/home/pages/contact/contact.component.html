<section class="contact-wrapper">

  <div class="contact-container">

    <!-- HEADER -->
    <div class="contact-header">

      <span class="subtitle">CONTACT US</span>

      <h1>
        Get in Touch with <span>CodiiiTech</span>
      </h1>

      <p class="contact-desc">
        Have a project in mind? Let's build something amazing together.
        Our team will respond within 24 hours.
      </p>

    </div>


    <!-- MAIN GRID -->
    <div class="contact-grid">

      <!-- CONTACT FORM -->
      <form class="contact-form" (ngSubmit)="submitForm()" #contactForm="ngForm">

        <div class="two-col">

          <div class="input-group">
            <label>Name</label>
            <input type="text" name="name" placeholder="Enter your name" [(ngModel)]="form.name" required>
          </div>

          <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Enter your email" [(ngModel)]="form.email" required>
          </div>

        </div>


        <div class="two-col">

          <div class="input-group">
            <label>Phone</label>
            <input type="tel" name="mobile" placeholder="Enter your phone" [(ngModel)]="form.mobile" required>
          </div>

          <div class="input-group">
            <label>Website</label>
            <input type="text" name="address" placeholder="Enter your website" [(ngModel)]="form.address">
          </div>

        </div>


        <div class="input-group">
          <label>Message</label>
          <textarea name="message" rows="5" placeholder="Write your message" [(ngModel)]="form.message" required>
          </textarea>
        </div>


        <button type="submit" [disabled]="contactForm.invalid || loading">

          {{ loading ? 'Sending...' : 'Send Message' }}

        </button>

      </form>
