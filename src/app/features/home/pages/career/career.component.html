<section class="career">

  <div class="career-container">

    <!-- HEADER -->
    <div class="career-header">
      <h1 class="career-title">
        Join Our <span>Team</span>
      </h1>

      <p class="career-subtitle">
        Help us build modern digital solutions and shape the future of technology.
      </p>
    </div>


    <!-- FILTER BAR -->
    <div class="career-filters">

      <div class="filter-item">

        <label>Department</label>

        <div class="select-wrapper">
          <select [(ngModel)]="selectedDepartment" class="filter-select">

            <option value="all">All Departments</option>
            <option value="frontend">Frontend</option>
            <option value="backend">Backend</option>
            <option value="design">Design</option>
            <option value="devops">DevOps</option>
            <option value="qa">QA</option>
            <option value="pm">Project Management</option>

          </select>

        </div>

      </div>


      <div class="filter-item">

        <label>Location</label>

        <div class="select-wrapper">
          <select [(ngModel)]="selectedLocation" class="filter-select">

            <option value="all">All Locations</option>
            <option value="mumbai">Mumbai</option>
            <option value="navi-mumbai">Navi Mumbai</option>
            <option value="remote">Remote</option>

          </select>

        </div>

      </div>

    </div>


    <!-- NO VACANCY CARD -->

    <div class="no-vacancy">

      <div class="vacancy-icon">💼</div>

      <h3>No Vacancies Available Right Now</h3>

      <p>
        Thank you for your interest in joining CodiiiTech.
        Currently we do not have open positions, but exciting
        opportunities will be announced soon.
      </p>

      <button class="notify-btn" (click)="openForm()">
        Stay Connected
      </button>

    </div>


    <!-- JOB GRID (future use) -->

    <!--

      <article class="job-card" *ngFor="let job of filteredJobs">

        <h3>{{ job.title }}</h3>

          {{ job.type }} • {{ job.location | titlecase }}
        </p>

        <p class="job-desc">
          {{ job.description }}
        </p>

        <a href="#" class="apply-btn">
          Apply Now
        </a>

      </article>

    </div>
    -->

  </div>

</section>
