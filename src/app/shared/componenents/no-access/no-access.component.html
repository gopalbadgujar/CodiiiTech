<section class="no-access">

  <div class="no-access-inner">

    <!-- LEFT SIDE CONTENT -->
    <div class="content">
      <span class="badge">403 • Protected Area</span>

      <h1>
        Access to this <span>Section</span> is Restricted
      </h1>

      <p>
        This area requires special permissions. 
        Please contact the administrator or return to the homepage.
      </p>

      <div class="actions">
        <button (click)="goHome()" class="btn primary">
          Return Home
        </button>

        <a (click)="goToContact()" class="btn ghost">
          Contact Us
        </a>
      </div>
    </div>

    <!-- RIGHT SIDE VISUAL -->
    <div class="visual">
      <div class="glass-panel">
        <div class="lock-icon">🔒</div>
        <div class="code">403</div>
      </div>
    </div>

  </div>

</section>
